id: workflow-engine
name: Workflow Engine
version: 0.20.0
enabled: true
domain: orchestration
description: Stateful workflow engine and runtime with history operations.

provides:
  agents:
    - workflow-runner
  workflows:
    - workflow.engine.run
  tools:
    - workflow.engine.run
    - workflow.engine.status
    - workflow.engine.history
    - workflow.engine.runs
    - workflow.runtime.inspect
    - workflow.runtime.cancel
    - workflow.runtime.retry
    - workflow.runtime.resume
    - workflow.runtime.export_history
  prompts:
    - workflow-summary
  schedules: []
  templates:
    - workflow-state
    - workflow-history
permissions:
  file_write: restricted
