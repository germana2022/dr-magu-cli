id: workflow-engine
name: Workflow Engine
version: 2.5.0
enabled: true
domain: orchestration
description: Operational workflow orchestration engine with definition catalog, planning, persisted state, context and history operations.

provides:
  agents:
    - workflow-runner
  workflows:
    - workflow.engine.run
  tools:
    - workflow.engine.plan
    - workflow.engine.show
    - workflow.engine.list
    - workflow.engine.run
    - workflow.engine.status
    - workflow.engine.history
    - workflow.engine.runs
    - workflow.runtime.inspect
    - workflow.runtime.cancel
    - workflow.runtime.retry
    - workflow.runtime.resume
    - workflow.runtime.export_history
  prompts:
    - workflow-summary
  schedules: []
  templates:
    - workflow-state
    - workflow-history
permissions:
  file_write: restricted
