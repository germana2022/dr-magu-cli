workflows:
  workflow.engine.run:
    name: Workflow Engine Run
    description: Execute a stateful workflow through the workflow runner.
    enabled: true
    deterministic: true
    tools:
      - workflow.engine.list
      - workflow.engine.show
      - workflow.engine.plan
      - workflow.engine.run
      - workflow.engine.status
      - workflow.engine.history
      - workflow.engine.runs
      - workflow.runtime.inspect
      - workflow.runtime.cancel
      - workflow.runtime.retry
      - workflow.runtime.resume
      - workflow.runtime.export_history
