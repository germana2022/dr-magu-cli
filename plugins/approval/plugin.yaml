id: approval
name: Approval
version: 0.14.0
enabled: true
domain: platform
description: Human-in-the-loop approval engine for sensitive actions and option selection.

provides:
  agents:
    - approval-manager
  workflows:
    - approval.review
  tools:
    - approval.request
    - approval.approve
    - approval.reject
    - approval.list
  prompts:
    - approval-summary
  schedules: []
  templates:
    - approval-request
permissions:
  file_write: restricted
