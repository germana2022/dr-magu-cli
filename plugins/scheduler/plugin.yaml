id: scheduler
name: Scheduler
version: 0.16.0
enabled: true
domain: automation
description: Scheduler runtime for persisted background-ready task orchestration.

provides:
  agents:
    - scheduler-manager
  workflows:
    - schedule.execute
  tools:
    - schedule.create
    - schedule.list
    - schedule.enable
    - schedule.disable
    - schedule.delete
    - schedule.run
  prompts:
    - schedule-summary
  schedules: []
  templates:
    - scheduled-task
permissions:
  file_write: restricted
