version: "0.9.4"
name: "dr-magu-cli-runtime-contracts-foundation"
description: "Tool CLI, TUI, sessions, repository scanner, context generation, workflow runtime, runtime introspection, Brain Context Loader, Agent Registry, Tool Registry, and Permission Context Reader."

runtime:
  default_workspace: "."
  output_format: "human"
  allow_json_output: true
  command_processor_enabled: true
  tui_enabled: true
  persistent_sessions_enabled: true
  repository_scanner_enabled: true
  context_generator_enabled: true
  workflow_runtime_enabled: true
  runtime_introspection_enabled: true
  brain_context_loader_enabled: true
  agent_registry_enabled: true
  formal_tool_registry_enabled: true
  permission_context_reader_enabled: true
  runtime_contracts_enabled: true
  brain_plan_validator_enabled: true
  brain_context_loader_enabled: true
  agent_registry_enabled: true
  formal_tool_registry_enabled: true
  permission_context_reader_enabled: true

permissions:
  file_read: true
  file_write: false
  file_delete: false
  shell_run: true
  git_status: true
  git_diff: true
  git_commit: false
  git_push: false

blocked_shell_patterns:
  - "rm -rf"
  - "del /s"
  - "format"
  - "shutdown"
  - "reboot"
  - "git push"
  - "git reset --hard"
  - "git clean -fd"

command_registry:
  enabled: true
  commands:
    - name: "files.list"
      category: "files"
      description: "List files inside the workspace."
    - name: "files.read"
      category: "files"
      description: "Read a text file from the workspace."
    - name: "search.code"
      category: "search"
      description: "Search text across source files."
    - name: "git.status"
      category: "git"
      description: "Show git status for the workspace."
    - name: "git.diff"
      category: "git"
      description: "Show git diff for the workspace."
    - name: "shell.run"
      category: "shell"
      description: "Run a shell command inside the workspace."
    - name: "repo.scan"
      category: "repository"
      description: "Scan the workspace and detect repository metadata."
    - name: "context.generate"
      category: "context"
      description: "Generate deterministic project context files from repository scan metadata."
    - name: "context.show"
      category: "context"
      description: "Show generated structured project context."
    - name: "context.path"
      category: "context"
      description: "Show the project context directory path."
    - name: "runtime.inspect"
      category: "runtime"
      description: "Inspect runtime context for commands, workflows, tools, permissions, session, workspace, and agents placeholder."

tui:
  enabled: true
  theme: "dark"
  session_manager_popup_enabled: true
  command_history_enabled: true
  repository_scan_enabled: true
  context_generator_enabled: true
  workflow_runtime_enabled: true
  runtime_introspection_enabled: true
  brain_context_loader_enabled: true
  agent_registry_enabled: true
  formal_tool_registry_enabled: true
  permission_context_reader_enabled: true
  brain_context_loader_enabled: true
  agent_registry_enabled: true
  formal_tool_registry_enabled: true
  permission_context_reader_enabled: true


brain:
  default_model_config: config/models.yaml
  llm_calls_enabled: false
  prompt_planner_enabled: false

agent_registry:
  enabled: true
  config_file: config/agents.yaml
  default_agent: repository-analyzer

tool_registry:
  enabled: true
  source: command_registry

permission_context:
  enabled: true
  source: permissions


runtime_contracts:
  enabled: true
  version: "0.9.4"
  formal_tool_contracts_enabled: true
  brain_plan_schema_enabled: true
  plan_validator_enabled: true

permission_policies:
  shell.run:
    mode: approval_required
    risk_level: high
    background_allowed: false
  git.push:
    mode: blocked
    risk_level: critical
    background_allowed: false
  files.delete:
    mode: blocked
    risk_level: critical
    background_allowed: false
